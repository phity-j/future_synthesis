<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Future Synthesis Admin</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="stylesheet" href="../assets/css/site.css">
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <p class="eyebrow">Pages CMS / GitHub OAuth</p>
      <h1>Future Synthesis 管理画面</h1>
      <p>記事、固定ページ、画像、SEO設定は Pages CMS から編集します。GitHubでログインすると、保存内容はリポジトリへ自動コミットされ、GitHub Pagesへ反映されます。</p>
      <div class="admin-actions">
        <a class="button primary" href="https://app.pagescms.org/" rel="noopener">Pages CMSを開く</a>
        <a class="button ghost" href="../README.md">使い方を見る</a>
      </div>
      <section class="admin-note">
        <h2>初回だけ必要なこと</h2>
        <ol>
          <li>Pages CMSでGitHubログインします。</li>
          <li><code>phity-j/future_synthesis</code> を選択します。</li>
          <li>設定ファイル <code>.pages.yml</code> が読み込まれたら、記事を追加できます。</li>
        </ol>
      </section>
    </main>
  </body>
</html>

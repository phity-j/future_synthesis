media:
  - name: images
    label: 画像
    input: public/images
    output: /public/images
  - name: thumbnails
    label: サムネイル
    input: public/thumbnails
    output: /public/thumbnails

content:
  - name: posts
    label: 記事
    type: collection
    path: content/posts
    filename: "{year}-{month}-{day}-{slug}.md"
    format: yaml-frontmatter
    view:
      fields: [title, status, category, publishedAt]
      primary: title
      sort: [publishedAt, title]
      default:
        search: ""
        sort: publishedAt
        order: desc
    fields:
      - { name: title, label: タイトル, type: string, required: true }
      - { name: description, label: メタ説明, type: text, required: true }
      - { name: slug, label: スラッグ, type: string, required: true }
      - { name: status, label: 状態, type: select, options: [draft, published, paid], default: draft, required: true }
      - { name: publishedAt, label: 公開日, type: date, options: { time: true }, required: true }
      - { name: updatedAt, label: 更新日, type: date, options: { time: true } }
      - { name: category, label: カテゴリー, type: select, options: [AI文明論, AGI, AI国家, AI資本主義, 建築AI, 木造建築2.0, 縮小社会, 国家戦略, ネット空間, 未来予測], required: true }
      - { name: tags, label: タグ, type: string, list: true }
      - { name: series, label: シリーズ, type: string }
      - { name: magazine, label: マガジン, type: string }
      - { name: thumbnail, label: サムネイル, type: image }
      - { name: ogImage, label: OGP画像, type: image }
      - { name: featured, label: 特集表示, type: boolean, default: false }
      - { name: popular, label: 人気記事表示, type: boolean, default: false }
      - { name: paid, label: 有料記事予定, type: boolean, default: false }
      - { name: canonical, label: canonical URL, type: string }
      - { name: body, label: 本文, type: rich-text }

  - name: pages
    label: 固定ページ
    type: collection
    path: content/pages
    filename: "{slug}.md"
    format: yaml-frontmatter
    fields:
      - { name: title, label: タイトル, type: string, required: true }
      - { name: description, label: メタ説明, type: text, required: true }
      - { name: slug, label: スラッグ, type: string, required: true }
      - { name: status, label: 状態, type: select, options: [draft, published], default: published }
      - { name: ogImage, label: OGP画像, type: image }
      - { name: canonical, label: canonical URL, type: string }
      - { name: body, label: 本文, type: rich-text }

  - name: site
    label: サイト設定・SEO
    type: file
    path: site.config.json
    fields:
      - { name: title, label: サイトタイトル, type: string }
      - { name: siteName, label: サイト名, type: string }
      - { name: description, label: サイト説明, type: text }
      - { name: url, label: 公開URL, type: string }
      - { name: author, label: 著者名, type: string }
      - { name: twitter, label: Twitter Card ID, type: string }
      - { name: defaultOgImage, label: 標準OGP画像, type: image }

settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "content(create): {path}"
      update: "content(update): {path}"
      delete: "content(delete): {path}"
      rename: "content(rename): {oldPath} -> {newPath}"

actions:
  - name: deploy-pages
    label: GitHub Pagesへ反映
    workflow: deploy.yml

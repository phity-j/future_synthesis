media:
  input: images
  output: /images
content:
  - name: posts
    label: 記事 (Posts)
    type: collection
    path: _posts
    view:
      fields:
        - title
        - date
        - category
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
      - name: date
        label: 日付
        type: date
        required: true
      - name: description
        label: 概要 (Description)
        type: string
      - name: thumbnail
        label: サムネイル画像
        type: image
      - name: category
        label: カテゴリー
        type: string
      - name: author
        label: 著者
        type: string
      - name: body
        label: 本文
        type: rich-text
  - name: pages
    label: 固定ページ (Pages)
    type: collection
    path: src/content/pages
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
      - name: body
        label: 本文
        type: rich-text
  - name: settings
    label: サイト基本設定 (Settings)
    type: file
    path: _config.yml
    fields:
      - name: title
        label: サイト名 (Title)
        type: string
        required: true
      - name: description
        label: サイトの説明 (Description)
        type: text
      - name: profile_name
        label: プロフィール - 名前
        type: string
      - name: profile_desc
        label: プロフィール - 紹介文
        type: text
      - name: profile_bio
        label: プロフィール - 経歴
        type: string
      - name: profile_url
        label: プロフィール - リンク先URL
        type: string
      - name: newsletter_title
        label: ニュースレター - タイトル
        type: string
      - name: newsletter_desc
        label: ニュースレター - 説明文
        type: text
      - name: newsletter_url
        label: ニュースレター - Substack URL
        type: string

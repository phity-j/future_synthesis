media:
  input: images
  output: /images
content:
  - name: posts
    label: 記事 (Posts)
    type: collection
    path: _posts
    view:
      fields:
        - title
        - date
        - category
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
      - name: date
        label: 日付
        type: date
        required: true
      - name: description
        label: 概要 (Description)
        type: string
      - name: thumbnail
        label: サムネイル画像
        type: image
      - name: category
        label: カテゴリー
        type: string
      - name: author
        label: 著者
        type: string
      - name: body
        label: 本文
        type: rich-text
  - name: pages
    label: 固定ページ (Pages)
    type: collection
    path: src/content/pages
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
      - name: body
        label: 本文
        type: rich-text

<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GVJK91KLLT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-GVJK91KLLT');
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    
    <!-- OGP / Twitter Card -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}{% if page.thumbnail %}{{ page.thumbnail }}{% else %}/images/hero_bg.png{% endif %}">
    
    <!-- Google Fonts Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@700&display=swap" rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'">
    
    <link rel="stylesheet" href="{{ site.baseurl }}/css/style.css">
</head>
<body>
    <header class="glass-header">
        <div class="header-container">
            <a href="{{ site.baseurl }}/" class="logo">FUTURE SYNTHESIS</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="{{ site.baseurl }}/#articles">最新記事</a></li>
                    <li><a href="{{ site.baseurl }}/#profile">プロフィール</a></li>
                    <li><a href="{{ site.baseurl }}/#newsletter">ニュースレター</a></li>
                </ul>
            </nav>
        </div>
    </header>

    {{ content }}

    <footer>
        <div class="footer-content">
            <h2 class="logo">FUTURE SYNTHESIS</h2>
            <p>&copy; 2026 Future Synthesis Media. Built with Jekyll.</p>
        </div>
    </footer>

    <script>
        // Header scroll effect
        const header = document.querySelector('.glass-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.style.background = 'rgba(3, 3, 8, 0.85)';
                header.style.borderBottom = '1px solid rgba(0, 240, 255, 0.2)';
            } else {
                header.style.background = 'rgba(3, 3, 8, 0.6)';
                header.style.borderBottom = '1px solid rgba(255, 255, 255, 0.05)';
            }
        });
        
        // Scroll fade-in observer
        const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    obs.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });
        
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
</body>
</html>

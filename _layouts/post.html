---
layout: default
---
<article class="post-content" style="padding-top: 8rem; max-width: 800px; margin: 0 auto; padding-bottom: 6rem;">
    <header class="post-header" style="margin-bottom: 3rem; text-align: center;">
        <div class="card-meta" style="display: flex; justify-content:center; gap:1rem; margin-bottom:1rem;">
            <span class="category {{ page.category | downcase }}">{{ page.category }}</span>
            <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
        </div>
        <h1 class="post-title" style="font-size: 2.8rem; margin-bottom: 2rem; line-height: 1.3;">{{ page.title }}</h1>
    </header>

    {% if page.thumbnail %}
        <img src="{{ site.baseurl }}{{ page.thumbnail }}" alt="{{ page.title }}" class="post-hero-image" style="width: 100%; height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 3rem;" />
    {% endif %}

    <div class="post-body markdown-body" style="font-size: 1.1rem; line-height: 1.8; color: #d0d4e0;">
        {{ content }}
    </div>

    <div class="sns-share" style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); text-align: center;">
        <p style="margin-bottom: 1rem; color: var(--text-muted);">この記事をシェアする</p>
        <div style="display: flex; justify-content: center; gap: 1rem;">
            <a href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&url={{ site.url }}{{ site.baseurl }}{{ page.url }}" target="_blank" rel="noopener noreferrer" style="padding: 0.5rem 1.5rem; background: rgba(255,255,255,0.1); border-radius: 20px; color: #fff; transition: background 0.3s;">X (Twitter)</a>
            <a href="https://note.com/phity" target="_blank" rel="noopener noreferrer" style="padding: 0.5rem 1.5rem; background: rgba(65, 201, 178, 0.2); border-radius: 20px; color: #41c9b2; transition: background 0.3s;">noteでフォロー</a>
            <a href="https://phity.substack.com" target="_blank" rel="noopener noreferrer" style="padding: 0.5rem 1.5rem; background: rgba(255, 103, 25, 0.2); border-radius: 20px; color: #ff6719; transition: background 0.3s;">Substack購読</a>
        </div>
    </div>
</article>
